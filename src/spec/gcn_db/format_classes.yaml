format_classes:
  - id: sop2
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 23, width: 7, meaning: "scalar SOP2 opcode" }
    fields:
      - { name: ssrc0, word: 0, lsb: 0, width: 8, meaning: "scalar source 0 selector" }
      - { name: ssrc1, word: 0, lsb: 8, width: 8, meaning: "scalar source 1 selector" }
      - { name: sdst, word: 0, lsb: 16, width: 7, meaning: "scalar destination register" }
      - { name: op, word: 0, lsb: 23, width: 7, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 30, width: 2, meaning: "format encoding tag" }
  - id: sopk
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 23, width: 5, meaning: "scalar SOPK opcode" }
    fields:
      - { name: simm16, word: 0, lsb: 0, width: 16, sign_extend: true, meaning: "16-bit signed immediate" }
      - { name: sdst, word: 0, lsb: 16, width: 7, meaning: "scalar destination register" }
      - { name: op, word: 0, lsb: 23, width: 5, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 28, width: 4, meaning: "format encoding tag" }
  - id: sop1
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 8, width: 8, meaning: "scalar SOP1 opcode" }
    fields:
      - { name: ssrc0, word: 0, lsb: 0, width: 8, meaning: "scalar source selector or inline literal marker" }
      - { name: op, word: 0, lsb: 8, width: 8, meaning: "opcode selector" }
      - { name: sdst, word: 0, lsb: 16, width: 7, meaning: "scalar destination register" }
      - { name: enc, word: 0, lsb: 23, width: 9, meaning: "format encoding tag" }
  - id: sopc
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 16, width: 7, meaning: "scalar compare opcode" }
    fields:
      - { name: ssrc0, word: 0, lsb: 0, width: 8, meaning: "scalar source 0 selector" }
      - { name: ssrc1, word: 0, lsb: 8, width: 8, meaning: "scalar source 1 selector" }
      - { name: op, word: 0, lsb: 16, width: 7, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 23, width: 9, meaning: "format encoding tag" }
  - id: sopp
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 16, width: 7, meaning: "scalar branch/control opcode" }
    fields:
      - { name: simm16, word: 0, lsb: 0, width: 16, sign_extend: true, meaning: "branch/control immediate" }
      - { name: op, word: 0, lsb: 16, width: 7, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 23, width: 9, meaning: "format encoding tag" }
  - id: smrd
    size_bytes: 8
    opcode_field: { name: op, word: 0, lsb: 22, width: 7, meaning: "scalar memory opcode (split field normalized)" }
    fields:
      - { name: offset, word: 0, lsb: 0, width: 8, meaning: "scalar memory offset or immediate field" }
      - { name: imm, word: 0, lsb: 8, width: 1, meaning: "offset immediate selector" }
      - { name: sbase, word: 0, lsb: 9, width: 6, meaning: "scalar base register pair selector" }
      - { name: sdst, word: 0, lsb: 15, width: 7, meaning: "scalar destination register or range base" }
      - { name: op_lo, word: 0, lsb: 22, width: 5, meaning: "opcode low bits" }
      - { name: op_hi, word: 0, lsb: 18, width: 2, meaning: "opcode high bits" }
      - { name: enc, word: 0, lsb: 27, width: 5, meaning: "format encoding tag" }
  - id: vop2
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 25, width: 6, meaning: "vector VOP2 opcode" }
    fields:
      - { name: src0, word: 0, lsb: 0, width: 9, meaning: "source 0 selector" }
      - { name: vsrc1, word: 0, lsb: 9, width: 8, meaning: "vector source 1 register" }
      - { name: vdst, word: 0, lsb: 17, width: 8, meaning: "vector destination register" }
      - { name: op, word: 0, lsb: 25, width: 6, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 31, width: 1, meaning: "format encoding tag" }
  - id: vop1
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 9, width: 8, meaning: "vector VOP1 opcode" }
    fields:
      - { name: src0, word: 0, lsb: 0, width: 9, meaning: "source 0 selector" }
      - { name: op, word: 0, lsb: 9, width: 8, meaning: "opcode selector" }
      - { name: vdst, word: 0, lsb: 17, width: 8, meaning: "vector destination register" }
      - { name: enc, word: 0, lsb: 25, width: 7, meaning: "format encoding tag" }
  - id: vopc
    size_bytes: 4
    opcode_field: { name: op, word: 0, lsb: 17, width: 8, meaning: "vector compare opcode" }
    fields:
      - { name: src0, word: 0, lsb: 0, width: 9, meaning: "source 0 selector" }
      - { name: vsrc1, word: 0, lsb: 9, width: 8, meaning: "vector source 1 register" }
      - { name: op, word: 0, lsb: 17, width: 8, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 25, width: 7, meaning: "format encoding tag" }
  - id: vop3a
    size_bytes: 8
    opcode_field: { name: op, word: 0, lsb: 17, width: 9, meaning: "vector VOP3A opcode" }
    fields:
      - { name: vdst, word: 0, lsb: 0, width: 8, meaning: "vector destination register" }
      - { name: abs, word: 0, lsb: 8, width: 3, meaning: "per-source abs modifiers" }
      - { name: clamp, word: 0, lsb: 11, width: 1, meaning: "result clamp modifier" }
      - { name: op, word: 0, lsb: 17, width: 9, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 26, width: 6, meaning: "format encoding tag" }
      - { name: src0, word: 1, lsb: 0, width: 9, meaning: "source 0 selector" }
      - { name: src1, word: 1, lsb: 9, width: 9, meaning: "source 1 selector" }
      - { name: src2, word: 1, lsb: 18, width: 9, meaning: "source 2 selector" }
      - { name: omod, word: 1, lsb: 27, width: 2, meaning: "output modifier" }
      - { name: neg, word: 1, lsb: 29, width: 3, meaning: "per-source neg modifiers" }
  - id: vop3p
    size_bytes: 8
    opcode_field: { name: op, word: 0, lsb: 16, width: 7, meaning: "vector VOP3P opcode" }
    fields:
      - { name: vdst, word: 0, lsb: 0, width: 8, meaning: "vector destination register" }
      - { name: op, word: 0, lsb: 16, width: 7, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 23, width: 9, meaning: "format encoding tag" }
      - { name: src0, word: 1, lsb: 0, width: 9, meaning: "source 0 selector" }
      - { name: src1, word: 1, lsb: 9, width: 9, meaning: "source 1 selector" }
      - { name: src2, word: 1, lsb: 18, width: 9, meaning: "source 2 selector" }
      - { name: op_sel_hi, word: 1, lsb: 27, width: 2, meaning: "high op_sel bits / variant modifiers" }
      - { name: neg_lo, word: 1, lsb: 29, width: 3, meaning: "negation / variant modifier bits" }
  - id: ds
    size_bytes: 8
    opcode_field: { name: op, word: 0, lsb: 17, width: 8, meaning: "DS/LDS opcode" }
    fields:
      - { name: offset0, word: 0, lsb: 0, width: 8, meaning: "LDS offset 0" }
      - { name: offset1, word: 0, lsb: 8, width: 8, meaning: "LDS offset 1" }
      - { name: gds, word: 0, lsb: 16, width: 1, meaning: "GDS selector bit" }
      - { name: op, word: 0, lsb: 17, width: 8, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 26, width: 6, meaning: "format encoding tag" }
      - { name: addr, word: 1, lsb: 0, width: 8, meaning: "address VGPR" }
      - { name: data0, word: 1, lsb: 8, width: 8, meaning: "data source 0 VGPR" }
      - { name: data1, word: 1, lsb: 16, width: 8, meaning: "data source 1 VGPR" }
      - { name: vdst, word: 1, lsb: 24, width: 8, meaning: "destination VGPR" }
  - id: flat
    size_bytes: 8
    opcode_field: { name: op, word: 0, lsb: 18, width: 7, meaning: "FLAT/GLOBAL opcode" }
    fields:
      - { name: offset, word: 0, lsb: 0, width: 13, meaning: "flat/global offset" }
      - { name: lds, word: 0, lsb: 13, width: 1, meaning: "LDS path selector" }
      - { name: seg, word: 0, lsb: 14, width: 2, meaning: "segment selector" }
      - { name: glc, word: 0, lsb: 16, width: 1, meaning: "global coherency bit" }
      - { name: slc, word: 0, lsb: 17, width: 1, meaning: "system level coherency bit" }
      - { name: op, word: 0, lsb: 18, width: 7, meaning: "opcode selector" }
      - { name: enc, word: 0, lsb: 25, width: 6, meaning: "format encoding tag" }
      - { name: addr, word: 1, lsb: 0, width: 8, meaning: "address VGPR base" }
      - { name: data, word: 1, lsb: 8, width: 8, meaning: "data VGPR or source" }
      - { name: saddr, word: 1, lsb: 16, width: 7, meaning: "scalar address register selector" }
      - { name: nv, word: 1, lsb: 23, width: 1, meaning: "address component count flag" }
      - { name: vdst, word: 1, lsb: 24, width: 8, meaning: "destination VGPR" }

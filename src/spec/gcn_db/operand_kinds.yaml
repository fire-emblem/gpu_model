operand_kinds:
  - id: scalar_reg
    category: scalar
    description: scalar register operand
  - id: scalar_reg_range
    category: scalar
    description: scalar register range operand
  - id: scalar_reg_pair_dest
    category: scalar
    description: 7-bit scalar destination field decoded as register pair or special pair register
  - id: scalar_src8
    category: scalar
    description: 8-bit scalar source selector decoded with inline constant rules
  - id: scalar_src8_pair
    category: scalar
    description: 8-bit scalar source selector decoded as register pair or special pair register
  - id: vector_reg
    category: vector
    description: vector register operand
  - id: vector_reg_range
    category: vector
    description: vector register range operand
  - id: special_reg
    category: special
    description: special architectural register operand
  - id: immediate
    category: immediate
    description: inline or decoded immediate operand
  - id: immediate_field
    category: immediate
    description: immediate directly decoded from a named bitfield
  - id: immediate_literal32
    category: immediate
    description: 32-bit literal immediate carried in the second instruction word
  - id: simm16
    category: immediate
    description: signed 16-bit immediate field
  - id: src9
    category: generic
    description: 9-bit source selector decoded with scalar/vector/immediate rules
  - id: branch_target
    category: control
    description: branch target or branch immediate operand
  - id: waitcnt_fields
    category: control
    description: decoded waitcnt domain thresholds
  - id: flat_addr
    category: memory
    description: flat/global address operand decoded from addr plus optional scalar address pair
  - id: flat_offset13
    category: immediate
    description: signed 13-bit flat/global offset field
  - id: vop3_sdst_pair
    category: scalar
    description: scalar destination pair encoded in VOP3 low-word control bits
  - id: vop3_src2_pair
    category: scalar
    description: scalar register pair encoded from the VOP3 src2 field
